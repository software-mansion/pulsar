name: Publish iOS package to CocoaPods

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.1.2)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: macos-latest
    env:
      COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install CocoaPods
        run: gem install cocoapods -v 1.16.2

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"

          if [[ -z "$VERSION" ]]; then
            echo "Release version could not be determined." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Verify iOS version metadata
        shell: bash
        run: |
          EXPECTED_VERSION="${{ steps.release.outputs.version }}"
          SDK_VERSION="$(ruby -rjson -e 'puts JSON.parse(File.read("sdk-versions.json")).fetch("ios").fetch("version")')"
          PODSPEC_VERSION="$(sed -n "s/.*s\\.version[[:space:]]*=[[:space:]]*'\\([^']*\\)'.*/\\1/p" iOS/Pulsar/Pulsar-haptics.podspec | head -n 1)"

          if [[ "$SDK_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "sdk-versions.json iOS version ($SDK_VERSION) does not match requested version ($EXPECTED_VERSION)." >&2
            exit 1
          fi

          if [[ "$PODSPEC_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "Pulsar-haptics.podspec version ($PODSPEC_VERSION) does not match requested version ($EXPECTED_VERSION)." >&2
            exit 1
          fi

      - name: Verify CocoaPods token
        shell: bash
        run: |
          if [[ -z "${COCOAPODS_TRUNK_TOKEN:-}" ]]; then
            echo "Missing COCOAPODS_TRUNK_TOKEN secret." >&2
            exit 1
          fi

      - name: Lint podspec
        working-directory: iOS/Pulsar
        run: ./publish-cocoapods.sh --lint-only

      - name: Publish to CocoaPods Trunk
        working-directory: iOS/Pulsar
        run: ./publish-cocoapods.sh
