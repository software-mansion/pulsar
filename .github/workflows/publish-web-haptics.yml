name: Publish pulsar-haptics to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (x.y.z). Leave empty to infer from branch name.'
        required: false
        default: ''
      tag:
        description: 'npm tag to publish under'
        required: false
        type: choice
        options:
          - latest
          - rc
          - beta
        default: 'latest'
      dry-run:
        description: 'Dry run'
        required: false
        type: boolean
        default: 'true'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: web/Pulsar
        run: npm ci

      - name: Run tests
        working-directory: web/Pulsar
        run: npm test

      - name: Publish stable
        uses: software-mansion/npm-package-publish@1bb885ec49bed729c8c1ec95a11a285d89f1bf45
        with:
          package-name: pulsar-haptics
          package-json-path: web/Pulsar/package.json
          release-type: stable
          version: ${{ github.event.inputs.version || '' }}
          tag: ${{ github.event.inputs.tag || 'latest' }}
          dry-run: ${{ github.event.inputs.dry-run || 'true' }}
          install-dependencies-command: npm ci
