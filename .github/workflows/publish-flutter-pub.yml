name: Publish Flutter package to pub.dev

on:
  push:
    tags:
      - 'pulsar-v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read

jobs:
  publish:
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: flutter/pulsar
