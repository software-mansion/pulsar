<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@pulsar/haptics - Demo</title>
    <link rel="stylesheet" href="example.css" />
  </head>
  <body>
    <h1>Haptics Demo</h1>
    <p class="subtitle">@pulsar/haptics</p>

    <div id="availability-badge" class="badge">checking...</div>
    <p class="engine-label" id="engine-label"></p>

    <div class="section">
      <div class="section-title">Impact</div>
      <div class="button-group">
        <button class="btn-blue" onclick="play('impactLight')">Light</button>
        <button class="btn-blue" onclick="play('impactMedium')">Medium</button>
        <button class="btn-blue" onclick="play('impactHeavy')">Heavy</button>
        <button class="btn-blue" onclick="play('impactSoft')">Soft</button>
        <button class="btn-blue" onclick="play('impactRigid')">Rigid</button>
        <button class="btn-blue" onclick="play('selection')">Selection</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Notification</div>
      <div class="button-group cols-2">
        <button class="btn-green"  onclick="play('notificationSuccess')">Success</button>
        <button class="btn-orange" onclick="play('notificationWarning')">Warning</button>
        <button class="btn-red"    onclick="play('notificationError')">Error</button>
        <button class="btn-purple" onclick="play('pulse')">Pulse</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Patterns</div>
      <div class="button-group">
        <button class="btn-gray" onclick="play('heartbeat')">Heartbeat</button>
        <button class="btn-gray" onclick="play('rumble', true)">Rumble</button>
        <button class="btn-gray" onclick="play('knock')">Knock</button>
        <button class="btn-gray" onclick="play('typewriter')">Typewriter</button>
        <button class="btn-gray" onclick="play('explosion')">Explosion</button>
        <button class="btn-gray" onclick="play('tickTock')">Tick-Tock</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Control</div>
      <div class="button-group cols-1">
        <button class="btn-gray" onclick="stop()">Stop</button>
      </div>
    </div>

    <div class="status">
      <span class="status-label">Last action</span>
      <span id="haptic-action">—</span>
    </div>

    <script src="dist/haptics.umd.js"></script>
    <script>
      const { Presets, Settings } = window.Haptics

      // Show availability and engine info
      const available = Settings.isHapticsAvailable()
      const badge = document.getElementById('availability-badge')
      badge.textContent = available ? 'Haptics available' : 'Haptics not supported'
      badge.className = 'badge ' + (available ? 'available' : 'unavailable')

      const engineLabel = document.getElementById('engine-label')
      if ('vibrate' in navigator) {
        engineLabel.textContent = 'Engine: Vibration API'
      } else if (available) {
        engineLabel.textContent = 'Engine: Safari switch trick'
      }

      function play(name) {
        const preset = Presets.System[name] ?? Presets[name]
        if (preset) {
          preset()
          document.getElementById('haptic-action').textContent = name
        }
      }

      function stop() {
        Settings.stopHaptics()
        document.getElementById('haptic-action').textContent = 'Stopped'
      }
    </script>
  </body>
</html>
