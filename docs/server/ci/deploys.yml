---
.deploy_base:
  image: registry.swmansion.com/infra/ansible-ci-helper:latest
  stage: deploy
  interruptible: true
  retry: 2
  before_script:
    - cat ${SSH_DEPLOY_KEY} | base64 --decode > /root/.ssh/id_rsa
    - git clone git@gl.swmansion.com:devops/internal-infrastructure/ansible
    - cd ansible
  script:
    - ansible-playbook
      --vault-id=${ANSIBLE_VAULT_PASS}
      --extra-vars "version=${CI_COMMIT_SHORT_SHA}"
      --tags=update-pulsar-server
      -l marketing-tools
      -i inventories/swm/${CI_ENVIRONMENT_NAME}.yml
      marketing-tools.yml


deploy_production:
  extends: .deploy_base
  environment: production
  variables:
    SSH_DEPLOY_KEY: $SSH_DEPLOY_KEY_PROD
    ANSIBLE_VAULT_PASS: $ANSIBLE_VAULT_PASS_PROD
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
